servers:
  - name: alpaca_mcp
    type: alpaca_mcp_tool
    host: localhost
    port: 8010
    enabled: true
    auto_start: true
    args:
      config: "config/llm_config.yaml"
    env:
      ALPACA_API_KEY: "${ALPACA_API_KEY}"
      ALPACA_API_SECRET: "${ALPACA_API_SECRET}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_DB: "${REDIS_DB}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
  - name: redis_mcp
    type: redis_mcp_tool
    host: localhost
    port: 8011
    enabled: true
    auto_start: true
    args:
      config: "config/llm_config.yaml"
    env:
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_DB: "${REDIS_DB}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
  - name: alpaca
    type: alpaca
    host: localhost
    port: 8000
    enabled: true
    auto_start: true
    args:
      config: "config/alpaca_config.yaml"
    env:
      ALPACA_API_KEY: "${ALPACA_API_KEY}"
      ALPACA_SECRET_KEY: "${ALPACA_SECRET_KEY}"
  - name: polygon_rest
    type: polygon_rest
    host: localhost
    port: 8001
    enabled: true
    auto_start: true
    args:
      config: "config/polygon_config.yaml"
    env:
      POLYGON_API_KEY: "${POLYGON_API_KEY}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
  - name: polygon_websocket
    type: polygon_websocket
    host: localhost
    port: 8002
    enabled: true
    auto_start: true
    args:
      config: "config/system_config.yaml"
    env:
      POLYGON_API_KEY: "${POLYGON_API_KEY}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
  - name: reddit_processor
    type: reddit_processor
    host: localhost
    port: 8003
    enabled: true
    auto_start: true
    args:
      config: "config/reddit_config.yaml"
    env:
      REDDIT_CLIENT_ID: "${REDDIT_CLIENT_ID}"
      REDDIT_CLIENT_SECRET: "${REDDIT_CLIENT_SECRET}"
      REDDIT_USERNAME: "${REDDIT_USERNAME}"
      REDDIT_PASSWORD: "${REDDIT_PASSWORD}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
  - name: redis
    type: redis
    host: localhost
    port: 8004
    enabled: true
    auto_start: true
    args:
      config: "config/redis_config.yaml"
    env:
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_DB: "${REDIS_DB}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
  - name: unusual_whales
    type: unusual_whales
    host: localhost
    port: 8005
    enabled: true
    auto_start: true
    args:
      config: "config/unusual_whales_config.yaml"
    env:
      UNUSUAL_WHALES_API_KEY: "${UNUSUAL_WHALES_API_KEY}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
      ADMIN_API_KEY: "${ADMIN_API_KEY}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_DB: "${REDIS_DB}"
  - name: yahoo_finance
    type: yahoo_finance
    host: localhost
    port: 8006
    enabled: true
    auto_start: true
    args:
      config: "config/yahoo_finance_config.yaml"
    env:
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_DB: "${REDIS_DB}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
  - name: llm_integration
    type: llm_integration
    host: localhost
    port: 8007
    enabled: true
    auto_start: true
    args:
      config: "config/llm_config.yaml"
    env:
      LLM_PROVIDER: "${LLM_PROVIDER:-openrouter}"
      LLM_MODEL: "${LLM_MODEL:-google/gemini-2.0-flash-001}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      SITE_URL: "${SITE_URL:-https://nextg3n.ai}"
      SITE_NAME: "${SITE_NAME:-NextG3N Trading System}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_DB: "${REDIS_DB}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
  - name: trade_llm
    type: trade_llm_server
    host: localhost
    port: 8009
    enabled: true
    auto_start: true
    args:
      config: "config/trade_llm_config.yaml"
    env:
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_DB: "${REDIS_DB}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      MCP_API_KEY: "${MCP_API_KEY:-test-key-123}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
  - name: llm_talk
    type: llm_talk
    host: localhost
    port: 8008
    enabled: true
    auto_start: true
    args:
      config: "config/llm_talk_config.yaml"
    env:
      MCP_API_KEY: "${MCP_API_KEY:-test-key-123}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_DB: "${REDIS_DB}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      VALID_API_KEYS: "${VALID_API_KEYS}"
connection:
  timeout_seconds: 30
  retry_attempts: 3
  retry_delay_seconds: 1
security:
  enable_auth: true
  api_key: "${MCP_API_KEY}"
health_check:
  interval_seconds: 60
  auto_restart: true
manager_port: 8080
# MCP Server Configuration
version: 1.0.0

# Server Registration
servers:
  - name: "alpaca"
    host: "localhost"
    port: 8000
    enabled: true
    description: "MCP Server for Alpaca LLM Integration"
    api_key: "${ALPACA_API_KEY}"
    secret_key: "${ALPACA_SECRET_KEY}"
    auto_start: true
    
  - name: "redis"
    host: "localhost"
    port: 8001
    enabled: true
    description: "MCP Server for Redis Integration"
    auto_start: true
    
  - name: "polygon_websocket"
    host: "localhost"
    port: 8002
    enabled: true
    description: "MCP Server for Polygon WebSocket Integration"
    api_key: "${POLYGON_API_KEY}"
    auto_start: true
    
  - name: "unusual_whales"
    host: "localhost"
    port: 8003
    enabled: true
    description: "MCP Server for Unusual Whales Options Flow Integration"
    api_key: "${UNUSUAL_WHALES_API_KEY}"
    auto_start: true
    
  - name: "reddit_processor"
    host: "localhost"
    port: 8004
    enabled: true
    description: "MCP Server for Reddit Social Sentiment Integration"
    client_id: "${REDDIT_CLIENT_ID}"
    client_secret: "${REDDIT_CLIENT_SECRET}"
    auto_start: true
    
  - name: "yahoo_finance"
    host: "localhost"
    port: 8005
    enabled: true
    description: "MCP Server for Yahoo Finance News and Market Data Integration"
    auto_start: true

  - name: "polygon_rest"
    host: "localhost"
    port: 8006
    enabled: true
    description: "MCP Server for Polygon REST API Integration"
    api_key: "${POLYGON_API_KEY}"
    auto_start: true

# Connection Settings
connection:
  timeout_seconds: 10
  retry_count: 3
  retry_delay_seconds: 2
  health_check_interval_seconds: 60

# Security
security:
  require_authentication: true
  token_expiry_minutes: 60
  allowed_origins:
    - "http://localhost:5000"
    - "http://localhost:5001"

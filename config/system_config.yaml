# NextG3N Trading System Configuration
version: 1.0.0
environment: dev

# MCP Servers (all data access is now via these FastAPI services)
mcp_servers:
  - name: "alpaca"
    host: "localhost"
    port: 8000
    enabled: true
  - name: "redis"
    host: "localhost"
    port: 8001
    enabled: true
  - name: "polygon_websocket"
    host: "localhost"
    port: 8002
    enabled: true
  - name: "unusual_whales"
    host: "localhost"
    port: 8003
    enabled: true
  - name: "reddit_processor"
    host: "localhost"
    port: 8004
    enabled: true
  - name: "yahoo_finance"
    host: "localhost"
    port: 8005
    enabled: true
  - name: "polygon_rest"
    host: "localhost"
    port: 8006
    enabled: true

# Core System
system:
  name: "NextG3N Trading System"
  debug: true
  log_level: "INFO"
  max_workers: 10
  timeout_seconds: 30

# Storage
storage:
  redis:
    host: "localhost"
    port: 6379
    db: 0
    max_retries: 3
    retry_delay: 1.0
    password: null

# Services
services:
  market_data:
    base_url: "https://data.alpaca.markets"
    api_key_id: "${ALPACA_API_KEY}"
    api_secret_key: "${ALPACA_SECRET_KEY}"
    paper_trading: true
    # Symbols now loaded dynamically from data sources instead of hard-coded
    symbols_source: "dynamic"
    symbols_file: "data/symbols.json"
    timeframes:
      - "1Min"
      - "5Min"
      - "15Min"
      - "1Hour"
      - "1Day"
    indicators:
      - "RSI"
      - "MACD"
      - "SMA"
      - "EMA"
      - "Bollinger"
      - "ATR"
      - "Volume"
  
  news:
    base_url: "https://newsapi.org/v2"
    api_key: "${NEWS_API_KEY}"
    max_articles: 50
    news_sources:
      - "financial-times"
      - "bloomberg"
      - "the-wall-street-journal"
      - "reuters"
      - "cnbc"
      - "business-insider"
    update_interval_minutes: 30
  
  stock_screening:
    update_interval_minutes: 15

  social:
    reddit:
      client_id: "${REDDIT_CLIENT_ID}"
      client_secret: "${REDDIT_CLIENT_SECRET}"
      username: "${REDDIT_USERNAME}"
      password: "${REDDIT_PASSWORD}"
      subreddits:
        - "wallstreetbets"
        - "stocks"
        - "investing"
        - "finance"
      max_posts: 100
      update_interval_minutes: 15
  
  options:
    base_url: "https://api.polygon.io/v3"
    api_key: "${POLYGON_API_KEY}"
    timeframes:
      - "1Day"
    top_options_limit: 20

# Models
models:
  stock_ranker:
    checkpoints_dir: "checkpoints/stock_ranker"
    use_gpu: true
    top_k: 10
    features:
      - "price_momentum"
      - "volume"
      - "volatility"
      - "rsi"
      - "macd"
      - "sentiment_score"
      - "options_activity"
  
  sentiment:
    checkpoints_dir: "checkpoints/sentiment"
    model_name: "finbert"
    use_llm: true
    batch_size: 16
  
  forecast:
    checkpoints_dir: "checkpoints/forecast"
    model_type: "lstm"
    horizon: 5
    features:
      - "close"
      - "volume"
      - "rsi"
      - "macd"
      - "bollinger"
    training:
      epochs: 100
      batch_size: 64
      validation_split: 0.2
  
  context:
    max_context_age_days: 30
    retrieve_top_k: 5
    generate_summary: true
  
  decision:
    checkpoints_dir: "checkpoints/decision"
    use_llm: true
    risk_tolerance: 0.5
    confidence_threshold: 0.7
  
  trade:
    max_position_size: 0.1
    max_positions: 10
    stop_loss_percentage: 0.05
    take_profit_percentage: 0.1
    timeframe: "1Day"
  
  backtest:
    start_date: "2023-01-01"
    end_date: "2023-12-31"
    initial_capital: 100000
    commission: 0.0

# LLM Integration
llm:
  model: "openai/gpt-4o"
  base_url: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"  # Loaded from environment using dotenv
  max_tokens: 1000
  temperature: 0.7
  top_p: 0.95
  request_timeout: 60
  retry_count: 3
  retry_delay: 5

# Orchestration
orchestration:
  use_agents: true
  group_chat_model: "openai/gpt-4o"
  max_consecutive_auto_reply: 10
  human_input_mode: "TERMINATE"

# Risk Management
risk_management:
  # Max percentage of total portfolio value to risk on a single trade
  max_risk_per_trade_pct: 0.02 # e.g., 2%
  # Minimum reward to risk ratio for a trade to be considered
  min_reward_risk_ratio: 2.0 # e.g., 2:1
  # Maximum percentage of total portfolio value that a single position can occupy
  max_position_value_pct: 0.10 # e.g., 10%

# Monitoring
monitoring:
  metrics_interval_seconds: 5
  system_health_check_interval_minutes: 10
  log_metrics: true
  alert_thresholds:
    cpu_percent: 80
    memory_percent: 80
    disk_usage_percent: 80
    prediction_latency_ms: 1000
  slack_alerts:
    enabled: true
    channel: "nextg3n-alerts"

# Visualization
visualization:
  trade_dashboard:
    host: "localhost"
    port: 5000
    refresh_interval_seconds: 10
  
  metrics_api:
    host: "localhost"
    port: 5001
    metrics_history_days: 7

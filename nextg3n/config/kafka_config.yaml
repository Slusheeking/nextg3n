# Kafka configuration for the NextG3N Trading System
# Defines settings for Kafka brokers, topics, and producers

# Kafka broker settings
bootstrap_servers:
  - "localhost:9092"  # Default single broker; add more for production cluster
client_id: "nextg3n_producer"
retries: 3
retry_backoff_ms: 1000
batch_size: 16384  # 16KB
linger_ms: 10

# Topic configuration
topic_prefix: "nextg3n-"
topics:
  ranking-events: "ranking-events"  # StockRanker events
  sentiment-events: "sentiment-events"  # SentimentModel events
  forecast-events: "forecast-events"  # ForecastModel events
  context-events: "context-events"  # ContextRetriever events
  decision-events: "decision-events"  # DecisionModel events
  trade-events: "trade-events"  # TradeExecutor events
  backtest-events: "backtest-events"  # BacktestEngine events
  trainer-events: "trainer-events"  # TrainerModel events
  visualization-events: "visualization-events"  # ChartGenerator events
  metrics-api-events: "metrics-api-events"  # MetricsApi events
  dashboard-events: "dashboard-events"  # TradeDashboard events
  health-events: "health-events"  # SystemHealthChecker events
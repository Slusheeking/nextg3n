# System-wide configuration for the NextG3N Trading System
# Defines settings for models, services, orchestration, storage, monitoring, visualization, and LLMs

# Kafka configuration for event publishing
kafka:
  bootstrap_servers: "localhost:9092"
  topic_prefix: "nextg3n_"

# LLM configuration for OpenRouter
llm:
  enabled: true
  provider: "openrouter"
  api_key: ""  # Placeholder: Set via OPENROUTER_API_KEY environment variable
  base_url: "https://openrouter.ai/api/v1"
  model: "openai/gpt-4"  # Default model; can switch to "anthropic/claude-3", etc.
  max_tokens: 512
  temperature: 0.7
  retry_attempts: 3
  retry_delay: 1000  # Milliseconds

# Models configuration
models:
  stock_ranker:
    enabled: true
    weights:
      price_prediction: 0.4
      sentiment_score: 0.3
      options_sentiment: 0.2
      technical_score: 0.1
  sentiment:
    enabled: true
    model_name: "roberta-base"
    max_length: 512
    checkpoint_path: ""  # Placeholder: Set to path of pre-trained RoBERTa checkpoint
    batch_size: 16
    learning_rate: 2e-5
    max_epochs: 3
  forecast:
    enabled: true
    max_encoder_length: 30
    max_prediction_length: 1
    hidden_size: 64
    lstm_layers: 2
    attention_head_size: 4
    dropout: 0.1
    hidden_continuous_size: 32
    output_size: 1
    loss: "quantile"
    log_interval: 10
    reduce_on_plateau_patience: 4
    learning_rate: 0.001
    max_epochs: 10
    checkpoint_path: ""  # Placeholder: Set to path of pre-trained TFT checkpoint
  context:
    enabled: true
    embedder_model: "all-MiniLM-L6-v2"
    embedding_dim: 384
    batch_size: 32
  decision:
    enabled: true
    state_dim: 64
    action_dim: 3
    n_positions: 128
    n_layer: 6
    n_head: 8
    hidden_size: 256
    checkpoint_path: ""  # Placeholder: Set to path of pre-trained Decision Transformer checkpoint
  trade:
    enabled: true
    capital: 100000.0
    max_position_size: 0.05  # 5% of capital per trade
    stop_loss_percent: 0.02  # 2% stop-loss
    alpaca_api_key: ""  # Placeholder: Set via environment variable ALPACA_API_KEY
    alpaca_api_secret: ""  # Placeholder: Set via environment variable ALPACA_SECRET_KEY
    alpaca_base_url: "https://paper-api.alpaca.markets"  # Paper trading by default
  backtest:
    enabled: true
    initial_capital: 100000.0
    commission: 0.001
    slippage: 0.0005
  trainer:
    enabled: true
    max_epochs: 10
    batch_size: 32
    checkpoint_dir: "./checkpoints"

# Services configuration
services:
  market_data:
    enabled: true
    provider: "alpaca"  # Placeholder: Set to actual provider (e.g., Alpaca, Yahoo Finance)
    api_key: ""  # Placeholder: Set via environment variable
    api_secret: ""  # Placeholder: Set via environment variable
    base_url: "https://data.alpaca.markets"  # Alpaca data API
  trade:
    enabled: true
    alpaca_api_key: ""  # Placeholder: Set via environment variable ALPACA_API_KEY
    alpaca_api_secret: ""  # Placeholder: Set via environment variable ALPACA_SECRET_KEY
    alpaca_base_url: "https://paper-api.alpaca.markets"
  news:
    enabled: true
    provider: "newsapi"  # Placeholder: Set to actual provider
    api_key: ""  # Placeholder: Set via environment variable
  social:
    enabled: true
    provider: "reddit"  # Placeholder: Set to actual provider (e.g., Twitter, Reddit)
    api_key: ""  # Placeholder: Set via environment variable
    api_secret: ""  # Placeholder: Set via environment variable
  cache:
    enabled: true
    redis_host: "localhost"
    redis_port: 6379
    redis_db: 0

# Orchestration configuration
orchestration:
  enabled: true
  agent_timeout: 300  # Seconds
  max_concurrent_tasks: 10

# Storage configuration
storage:
  redis:
    enabled: true
    host: "localhost"
    port: 6379
    db: 0
  vector_db:
    enabled: true
    provider: "chromadb"  # Options: chromadb, faiss
    host: "localhost"
    port: 8001
    collection_name: "nextg3n_vectors"
    embedding_dim: 384  # Matches all-MiniLM-L6-v2

# Monitoring configuration
monitoring:
  metrics_logger:
    enabled: true
    log_level: "INFO"
  system_analyzer:
    enabled: true
    check_interval: 60  # Seconds
  resource_tracker:
    enabled: true
    track_interval: 30  # Seconds

# Visualization configuration
visualization:
  chart_generator:
    enabled: true
    output_dir: "./charts"
    figure_size: [12, 8]
    style: "seaborn"
  metrics_api:
    enabled: true
    host: "localhost"
    port: 8000
  trade_dashboard:
    enabled: true
    host: "localhost"
    port: 3050
    metrics_api_url: "http://localhost:8000"
    chart_dir: "./charts"
    refresh_interval: 60
    default_symbol: "AAPL"
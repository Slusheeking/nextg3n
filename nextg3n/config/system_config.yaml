# System-wide configuration for NextG3N Trading System
kafka:
  bootstrap_servers: "localhost:9092"
  topic_prefix: "nextg3n-"
mcp_servers:
  polygon:
    endpoint: "http://localhost:8002/polygon"
  yahoo_finance:
    endpoint: "http://localhost:8003/yahoo_finance"
  alpaca:
    endpoint: "http://localhost:8006/alpaca"
models:
  stock_ranker:
    enabled: true
    weights:
      volatility: 0.3
      liquidity: 0.25
      sentiment: 0.2
      technicals: 0.15
      whale_activity: 0.1
  forecast:
    enabled: true
    model_name: "lstm"
    input_size: 5
    hidden_size: 64
    num_layers: 2
    model_path: "models/forecast/lstm_model.pth"
    use_gpu: false
    up_threshold: 0.01
    down_threshold: -0.01
  decision:
    enabled: true
    up_threshold: 0.01
    down_threshold: -0.01
  trade:
    enabled: true
    capital: 5000.0
    max_position_size: 0.2
    stop_loss_percent: 0.03
    alpaca_api_key: ""  # Set via ALPACA_API_KEY
    alpaca_api_secret: ""  # Set via ALPACA_SECRET_KEY
    alpaca_base_url: "https://api.alpaca.markets" # Production URL
services:
  market_data:
    enabled: true
    polygon:
      api_key: ""  # Set via POLYGON_API_KEY
      base_url: "https://api.polygon.io/v2"
      ws_url: "wss://socket.polygon.io/stocks"
  cache:
    enabled: true
    redis_host: "localhost"
    redis_port: 6379
    redis_db: 0
storage:
  redis:
    enabled: true
    host: "localhost"
    port: 6379
    db: 0
  vector_db:
    enabled: true
    provider: "chromadb"
    host: "localhost"
    port: 8001
    collection_name: "nextg3n_vectors"
    embedding_dim: 384
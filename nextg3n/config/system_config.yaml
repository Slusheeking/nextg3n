# System-wide configuration for NextG3N Trading System
kafka:
  bootstrap_servers: "localhost:9092"
  topic_prefix: "nextg3n-"
llm:
  enabled: true
  provider: "openrouter"
  api_key: ""  # Set via OPENROUTER_API_KEY
  base_url: "https://openrouter.ai/api/v1"
  model: "gpt-4"
  max_tokens: 512
  temperature: 0.7
  retry_attempts: 3
  retry_delay: 1000
mcp_servers:
  polygon:
    endpoint: "http://localhost:8002/polygon"
  yahoo_finance:
    endpoint: "http://localhost:8003/yahoo_finance"
  unusual_whales:
    endpoint: "http://localhost:8004/unusual_whales"
  reddit:
    endpoint: "http://localhost:8005/reddit"
  alpaca:
    endpoint: "http://localhost:8006/alpaca"
models:
  stock_ranker:
    enabled: true
    weights:
      volatility: 0.3
      liquidity: 0.25
      sentiment: 0.2
      technicals: 0.15
      whale_activity: 0.1
  sentiment:
    enabled: true
    model_name: "finbert"
    max_length: 512
    batch_size: 16
  forecast:
    enabled: true
    model_name: "lstm"
    hidden_size: 64
    num_layers: 2
  decision:
    enabled: true
    chat_agents: ["sentiment", "forecast"]
    weights: [0.3, 0.7]
    max_round: 2
  trade:
    enabled: true
    capital: 5000.0
    max_position_size: 0.2
    stop_loss_percent: 0.03
    alpaca_api_key: ""  # Set via ALPACA_API_KEY
    alpaca_api_secret: ""  # Set via ALPACA_SECRET_KEY
    alpaca_base_url: "https://paper-api.alpaca.markets"
services:
  market_data:
    enabled: true
    polygon:
      api_key: ""  # Set via POLYGON_API_KEY
      base_url: "https://api.polygon.io/v2"
      ws_url: "wss://socket.polygon.io/stocks"
    yahoo:
      enabled: true
  news:
    enabled: true
    llm:
      model_name: "google/flan-t5-base"
    newsapi:
      api_key: ""  # Set via NEWS_API_KEY
    yahoo:
      enabled: true
  llm:
    model_name: "google/flan-t5-base"
  social:
    enabled: true
    reddit:
      client_id: ""  # Set via REDDIT_CLIENT_ID
      client_secret: ""  # Set via REDDIT_CLIENT_SECRET
      user_agent: ""  # Set via REDDIT_USER_AGENT
  options:
    enabled: true
    unusual_whales:
      api_key: ""  # Set via UNUSUAL_WHALES_API_KEY
      base_url: "https://api.unusualwhales.com/v1"
  cache:
    enabled: true
    redis_host: "localhost"
    redis_port: 6379
    redis_db: 0
orchestration:
  strategy_refinement:
    enabled: true
    model_name: "google/flan-t5-base"
storage:
  redis:
    enabled: true
    host: "localhost"
    port: 6379
    db: 0
  vector_db:
    enabled: true
    provider: "chromadb"
    host: "localhost"
    port: 8001
    collection_name: "nextg3n_vectors"
    embedding_dim: 384
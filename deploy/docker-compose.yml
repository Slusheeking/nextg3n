version: '3.8'

services:
  nextg3n-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: nextg3n-mcp
    restart: always
    ports:
      - "8000:8000"  # alpaca_server
      - "8001:8001"  # redis_server
      - "8002:8002"  # polygon_websocket_server
      - "8003:8003"  # unusual_whales_server
      - "8004:8004"  # reddit_processor_server
      - "8005:8005"  # yahoo_finance_server
      - "8006:8006"  # polygon_rest_server
      - "8080:8080"  # mcp_manager API
    volumes:
      - ../.env:/app/.env:ro
      - ../historical:/app/historical
      - ../logs:/app/logs
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - nextg3n-network

networks:
  nextg3n-network:
    driver: bridge